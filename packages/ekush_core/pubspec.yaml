name: ekush_core
description: Core reusable classes and utilities for Ekush applications.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  intl: ^0.20.2
  in_app_review: ^2.0.11
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5

  ekush_ui:
    path: ../ekush_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

resolution: workspace
