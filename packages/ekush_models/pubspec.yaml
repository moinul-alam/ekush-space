name: ekush_models
description: Shared Drift data models for Ekush Labs apps.
publish_to: none
version: 1.0.0

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # Drift database
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Code generation
  build_runner: ^2.4.12
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
