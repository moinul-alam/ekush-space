name: jhuri
description: ঝুড়ি — Smart Grocery List by Ekush Labs
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#2D6A4F"
  adaptive_icon_foreground: "assets/images/app_icon.png"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  go_router: ^16.2.4
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.0
  permission_handler: ^11.3.1
  share_plus: ^11.1.0
  google_mobile_ads: ^7.0.0
  in_app_review: ^2.0.11
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  ekush_theme:
    path: ../../packages/ekush_theme
  ekush_core:
    path: ../../packages/ekush_core
  ekush_ads:
    path: ../../packages/ekush_ads
  ekush_ui:
    path: ../../packages/ekush_ui
  ekush_notifications:
    path: ../../packages/ekush_notifications
  ekush_share:
    path: ../../packages/ekush_share
  ekush_models:
    path: ../../packages/ekush_models

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
